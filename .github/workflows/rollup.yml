# ============================================================
# rollup.yml
# Runs nightly dbt refresh + raw data purge
# Triggers: cron at midnight NZT (12:00 UTC) + manual dispatch
# ============================================================

name: NZ Energy Rollup

on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  rollup:
    name: dbt Run + Purge
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB:       nz_energy
          POSTGRES_USER:     postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Set up database schema
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -d nz_energy \
            -f database/schema.sql
          psql -h localhost -U postgres -d nz_energy \
            -f database/seed.sql

      - name: Set up dbt profiles
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << EOF
          nz_energy_dbt:
            target: dev
            outputs:
              dev:
                type: postgres
                host: localhost
                port: 5432
                user: postgres
                pass: postgres
                dbname: nz_energy
                schema: public
                threads: 4
          EOF

      - name: Run rollup flow
        env:
          PREFECT_API_KEY:  ${{ secrets.PREFECT_API_KEY }}
          PREFECT_API_URL:  ${{ secrets.PREFECT_API_URL }}
          DB_HOST:          localhost
          DB_PORT:          5432
          DB_NAME:          nz_energy
          DB_USER:          postgres
          DB_PASSWORD:      postgres
        run: python pipeline/flows/rollup_flow.py