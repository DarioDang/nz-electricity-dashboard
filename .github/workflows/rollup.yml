# ============================================================
# rollup.yml
# Runs nightly dbt refresh + raw data purge
# Triggers: cron at midnight NZT (12:00 UTC) + manual dispatch
# ============================================================

name: NZ Energy Rollup

on:
  schedule:
    # Midnight NZT = 12:00 UTC
    - cron: "0 12 * * *"

  # Allow manual trigger from GitHub UI
  workflow_dispatch:

jobs:
  rollup:
    name: dbt Run + Purge
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:

      # --------------------------------------------------------
      # 1. Check out the repo
      # --------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # --------------------------------------------------------
      # 2. Set up Python 3.10
      # --------------------------------------------------------
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10.0"
          cache: "pip"

      # --------------------------------------------------------
      # 3. Install dependencies
      # --------------------------------------------------------
      - name: Install dependencies
        run: pip install -r requirements.txt

      # --------------------------------------------------------
      # 4. Set up dbt profiles
      # Creates ~/.dbt/profiles.yml from secrets
      # --------------------------------------------------------
      - name: Set up dbt profiles
        env:
          DB_HOST:     ${{ secrets.DB_HOST }}
          DB_PORT:     ${{ secrets.DB_PORT }}
          DB_NAME:     ${{ secrets.DB_NAME }}
          DB_USER:     ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << EOF
          nz_energy_dbt:
            target: dev
            outputs:
              dev:
                type: postgres
                host: ${DB_HOST}
                port: ${DB_PORT}
                user: ${DB_USER}
                pass: ${DB_PASSWORD}
                dbname: ${DB_NAME}
                schema: public
                threads: 4
          EOF

      # --------------------------------------------------------
      # 5. Run rollup flow
      # --------------------------------------------------------
      - name: Run rollup flow
        env:
          PREFECT_API_KEY:  ${{ secrets.PREFECT_API_KEY }}
          PREFECT_API_URL:  ${{ secrets.PREFECT_API_URL }}
          DB_HOST:          ${{ secrets.DB_HOST }}
          DB_PORT:          ${{ secrets.DB_PORT }}
          DB_NAME:          ${{ secrets.DB_NAME }}
          DB_USER:          ${{ secrets.DB_USER }}
          DB_PASSWORD:      ${{ secrets.DB_PASSWORD }}
        run: python pipeline/flows/rollup_flow.py