# ============================================================
# ingest.yml
# Runs NZ energy ingest pipeline every 30 minutes
# Triggers: cron schedule + manual dispatch
# Compute: GitHub Actions free tier (Ubuntu)
# ============================================================

name: NZ Energy Ingest

on:
  schedule:
    # Every 30 minutes, all day every day
    # GitHub Actions uses UTC
    - cron: "*/30 * * * *"

  # Allow manual trigger from GitHub UI
  workflow_dispatch:

jobs:
  ingest:
    name: Extract Transform Load
    runs-on: ubuntu-latest
    timeout-minutes: 10       # kill if hanging

    steps:

      # --------------------------------------------------------
      # 1. Check out the repo
      # --------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # --------------------------------------------------------
      # 2. Set up Python 3.10
      # --------------------------------------------------------
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10.0"
          cache: "pip"          # cache pip dependencies

      # --------------------------------------------------------
      # 3. Install dependencies
      # --------------------------------------------------------
      - name: Install dependencies
        run: pip install -r requirements.txt

      # --------------------------------------------------------
      # 4. Run ingest flow
      # Prefect picks up env vars automatically
      # --------------------------------------------------------
      - name: Run ingest flow
        env:
          PREFECT_API_KEY:  ${{ secrets.PREFECT_API_KEY }}
          PREFECT_API_URL:  ${{ secrets.PREFECT_API_URL }}
          DB_HOST:          ${{ secrets.DB_HOST }}
          DB_PORT:          ${{ secrets.DB_PORT }}
          DB_NAME:          ${{ secrets.DB_NAME }}
          DB_USER:          ${{ secrets.DB_USER }}
          DB_PASSWORD:      ${{ secrets.DB_PASSWORD }}
        run: python pipeline/flows/ingest_flow.py