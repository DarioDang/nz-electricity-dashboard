# ============================================================
# ingest.yml
# Runs NZ energy ingest pipeline every 30 minutes
# Triggers: cron schedule + manual dispatch
# Compute: GitHub Actions free tier (Ubuntu)
# ============================================================

name: NZ Energy Ingest

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ingest:
    name: Extract Transform Load
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB:       nz_energy
          POSTGRES_USER:     postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Set up database schema
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -d nz_energy \
            -f database/schema.sql
          psql -h localhost -U postgres -d nz_energy \
            -f database/seed.sql

      - name: Run ingest flow
        env:
          PREFECT_API_KEY:  ${{ secrets.PREFECT_API_KEY }}
          PREFECT_API_URL:  ${{ secrets.PREFECT_API_URL }}
          DB_HOST:          localhost
          DB_PORT:          5432
          DB_NAME:          nz_energy
          DB_USER:          postgres
          DB_PASSWORD:      postgres
        run: python pipeline/flows/ingest_flow.py