version: 2

sources:
  - name: em6
    description: "Raw tables ingested from em6 free API by Python pipeline"
    database: nz_energy
    schema: public
    tables:

      - name: carbon_intensity
        description: "NZ grid carbon intensity per 30-min trading period"
        columns:
          - name: timestamp
            tests:
              - not_null
              - unique
          - name: trading_period
            tests:
              - not_null
          - name: nz_renewable
            tests:
              - not_null

      - name: node_prices
        description: "Spot prices at 6 key NZ grid nodes per trading period"
        columns:
          - name: node_id
            tests:
              - not_null
              - accepted_values:
                  values: ['OTA2201','HAY2201','BEN2201',
                           'WKM2201','KIK2201','ISL2201']
          - name: price
            tests:
              - not_null
          - name: timestamp
            tests:
              - not_null

      - name: regional_prices
        description: "Average spot price per NZ grid region per trading period"
        columns:
          - name: timestamp
            tests:
              - not_null
          - name: grid_zone_id
            tests:
              - not_null
          - name: price
            tests:
              - not_null

      - name: generation_forecast
        description: "Wind and solar generation forecast per region"
        columns:
          - name: timestamp
            tests:
              - not_null
          - name: generation_type
            tests:
              - not_null
              - accepted_values:
                  values: ['WIN', 'SOL']
          - name: region
            tests:
              - not_null
              - accepted_values:
                  values: ['NI', 'SI', 'NZ']

      - name: reserve_prices
        description: "Fast and sustained reserve prices for NI and SI"
        columns:
          - name: timestamp
            tests:
              - not_null
          - name: region
            tests:
              - not_null
              - accepted_values:
                  values: ['NI', 'SI']
          - name: sir_price
            tests:
              - not_null
          - name: fir_price
            tests:
              - not_null

      - name: grid_zones
        description: "Static reference table for NZ grid zones"
        columns:
          - name: grid_zone_id
            tests:
              - not_null
              - unique
          - name: grid_zone_name
            tests:
              - not_null
          - name: island
            tests:
              - not_null
              - accepted_values:
                  values: ['NI', 'SI']